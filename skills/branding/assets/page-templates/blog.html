<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#181712">
  <title>{{post.title}} · {{brand.name}}</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family={{brand.font.display}}|{{brand.font.body}}&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: {{brand.color.bg}};
      --fg: {{brand.color.fg}};
      --fg-muted: {{brand.color.fg-muted}};
      --accent: {{brand.color.accent}};
      --surface-elevated: {{brand.color.surface-elevated}};
      --border: {{brand.color.border}};
      --font-display: "{{brand.font.display}}", Georgia, serif;
      --font-body: "{{brand.font.body}}", system-ui, sans-serif;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--fg); font-family: var(--font-body); line-height: 1.7; -webkit-font-smoothing: antialiased; }

    .skip-link { position: absolute; left: -10000px; background: var(--accent); color: white; padding: 0.75rem 1rem; }
    .skip-link:focus { left: 1rem; top: 1rem; z-index: 100; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); }
    nav { display: flex; justify-content: space-between; max-width: 720px; margin: 0 auto; }
    nav a { color: var(--fg); text-decoration: none; }

    main { max-width: 720px; margin: 0 auto; padding: 4rem 2rem; }

    article > .meta {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin-bottom: 1rem;
      font-variant-numeric: tabular-nums;
    }

    article h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.025em;
      text-wrap: balance;
      margin-bottom: 1rem;
    }

    article > .lead {
      font-size: 1.25rem;
      color: var(--fg-muted);
      text-wrap: pretty;
      margin-bottom: 2rem;
    }

    article > figure.cover {
      margin: 2rem 0 3rem;
    }
    article > figure.cover img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }
    article > figure.cover figcaption {
      font-size: 0.8rem;
      color: var(--fg-muted);
      margin-top: 0.5rem;
      text-align: center;
    }

    .prose h2 { font-family: var(--font-display); font-size: 1.75rem; line-height: 1.2; letter-spacing: -0.02em; margin: 3rem 0 1rem; text-wrap: balance; }
    .prose h3 { font-family: var(--font-display); font-size: 1.35rem; margin: 2rem 0 0.5rem; }
    .prose p { text-wrap: pretty; margin-bottom: 1rem; max-width: 65ch; }
    .prose a { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
    .prose blockquote { border-left: 3px solid var(--accent); padding-left: 1.5rem; margin: 2rem 0; font-style: italic; color: var(--fg-muted); }
    .prose code { font-family: ui-monospace, monospace; background: var(--surface-elevated); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
    .prose pre { background: var(--surface-elevated); padding: 1.5rem; border-radius: 8px; overflow-x: auto; margin: 1.5rem 0; }
    .prose ul, .prose ol { margin: 1rem 0 1rem 1.5rem; }
    .prose li { margin-bottom: 0.5rem; }

    .author { display: flex; align-items: center; gap: 1rem; margin: 4rem 0 2rem; padding: 1.5rem; background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 12px; }
    .author img { width: 48px; height: 48px; border-radius: 50%; }
    .author__name { font-weight: 600; }
    .author__bio { font-size: 0.85rem; color: var(--fg-muted); }

    footer { padding: 2rem; border-top: 1px solid var(--border); margin-top: 6rem; color: var(--fg-muted); font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Pular para conteúdo</a>

  <header>
    <nav aria-label="Principal">
      <a href="/">{{brand.name}}</a>
      <a href="/blog">← Blog</a>
    </nav>
  </header>

  <main id="main">
    <article>
      <p class="meta"><time datetime="{{post.date}}">{{post.date_formatted}}</time> · {{post.read_time}} min</p>
      <h1>{{post.title}}</h1>
      <p class="lead">{{post.lead}}</p>

      <figure class="cover">
        <img src="{{post.cover}}" alt="{{post.cover_alt}}" width="1200" height="630" loading="eager">
        <figcaption>{{post.cover_credit}}</figcaption>
      </figure>

      <div class="prose">
        {{post.content_html}}
      </div>

      <aside class="author">
        <img src="{{post.author.avatar}}" alt="{{post.author.name}}" width="48" height="48">
        <div>
          <p class="author__name">{{post.author.name}}</p>
          <p class="author__bio">{{post.author.bio}}</p>
        </div>
      </aside>
    </article>
  </main>

  <footer>
    <p>© {{year}} {{brand.name}}.</p>
  </footer>
</body>
</html>
